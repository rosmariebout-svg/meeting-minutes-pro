name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openai sounddevice soundfile numpy pyperclip reportlab

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "MeetingMinutesPro" meeting_minutes_pro.py

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: MeetingMinutesPro
          path: dist/MeetingMinutesPro.exe
